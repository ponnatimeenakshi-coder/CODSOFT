
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Analytics Dashboard</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

h1 {
    text-align: center;
    padding: 20px;
}

.dashboard {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.kpi {
    display: flex;
    justify-content: space-around;
    margin: 20px;
}

.kpi div {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>📊 Business Sales Dashboard</h1>

<!-- KPI Section -->
<div class="kpi">
    <div>Total Revenue<br><span id="revenue"></span></div>
    <div>Total Profit<br><span id="profit"></span></div>
    <div>Total Orders<br><span id="orders"></span></div>
</div>

<div class="dashboard">

    <div class="card">
        <h3>Revenue Trend</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="card">
        <h3>Top Products</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="card">
        <h3>Category Distribution</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
        <h3>Regional Sales</h3>
        <canvas id="regionChart"></canvas>
    </div>

</div>

<script>

const salesData = [
    {product:"Laptop", category:"Electronics", region:"North", sales:50000, profit:5000, month:"Jan"},
    {product:"Phone", category:"Electronics", region:"South", sales:30000, profit:4000, month:"Feb"},
    {product:"Table", category:"Furniture", region:"East", sales:20000, profit:2000, month:"Mar"},
    {product:"Shirt", category:"Clothing", region:"West", sales:15000, profit:1500, month:"Apr"},
    {product:"Laptop", category:"Electronics", region:"South", sales:40000, profit:4500, month:"May"}
];


let revenue = 0, profit = 0;

salesData.forEach(d => {
    revenue += d.sales;
    profit += d.profit;
});

document.getElementById("revenue").innerText = revenue;
document.getElementById("profit").innerText = profit;
document.getElementById("orders").innerText = salesData.length;


new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: salesData.map(d => d.month),
        datasets: [{
            label: 'Revenue',
            data: salesData.map(d => d.sales)
        }]
    }
});


let productSales = {};
salesData.forEach(d => {
    productSales[d.product] = (productSales[d.product] || 0) + d.sales;
});

new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: Object.keys(productSales),
        datasets: [{
            label: 'Sales',
            data: Object.values(productSales)
        }]
    }
});


let categorySales = {};
salesData.forEach(d => {
    categorySales[d.category] = (categorySales[d.category] || 0) + d.sales;
});

new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: Object.keys(categorySales),
        datasets: [{
            data: Object.values(categorySales)
        }]
    }
});


let regionSales = {};
salesData.forEach(d => {
    regionSales[d.region] = (regionSales[d.region] || 0) + d.sales;
});

new Chart(document.getElementById("regionChart"), {
    type: 'bar',
    data: {
        labels: Object.keys(regionSales),
        datasets: [{
            label: 'Sales',
            data: Object.values(regionSales)
        }]
    }
});

</script>

</body>
</html>
